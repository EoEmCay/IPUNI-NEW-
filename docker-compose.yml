services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - ./backend/.env
    volumes:
      - diaplus_db:/app/database # Persist SQLite database in a Docker volume
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # We use a secondary container or command to pull the model if it doesn't exist
    # Here we just run the server.

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ./init-ollama.sh:/init-ollama.sh
    entrypoint: ["sh", "/init-ollama.sh"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data:
  diaplus_db:
